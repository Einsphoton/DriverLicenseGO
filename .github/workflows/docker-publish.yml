name: Build and Publish Docker Image

# 触发条件：推送到 main/master、打 tag、PR 检查
on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths-ignore:
      - "README.md"
      - "docs/**"
      - ".gitignore"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # 允许手动触发

env:
  REGISTRY: ghcr.io
  # 镜像名统一小写（GHCR 要求）
  IMAGE_NAME: ${{ github.repository_owner }}/driver-license-go

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 推送到 GHCR 需要的权限
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=DriverLicenseGO
            org.opencontainers.image.description=中国驾考科目一模拟考试 Docker 应用
            org.opencontainers.image.source=https://github.com/Einsphoton/DriverLicenseGO

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Output image digest
        run: |
          echo "构建完成 ✅"
          echo "镜像地址: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo ""
          echo "NAS 拉取命令："
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
